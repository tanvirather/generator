<div class="table-wrapper">
  <!-- Header Bar -->
  <div class="table-header" *ngIf="caption || showSearch">
    <h2 class="table-caption" *ngIf="caption">{{ caption }}</h2>
    <div class="search-box" *ngIf="showSearch">
      <span class="search-icon">⌕</span>
      <input type="text" placeholder="Search..." [(ngModel)]="searchQuery" (ngModelChange)="onSearch()"
        class="search-input" aria-label="Search table" />
    </div>
  </div>

  <!-- Table -->
  <div class="table-scroll">
    <table class="data-table" role="grid">
      <thead>
        <tr>
          <th *ngFor="let col of columns" [class.sortable]="col.sortable"
            [class.sorted-asc]="sortKey === col.key && sortDirection === 'asc'"
            [class.sorted-desc]="sortKey === col.key && sortDirection === 'desc'" [style.width]="col.width || 'auto'"
            [style.text-align]="col.align || 'left'" (click)="sort(col)" [attr.aria-sort]="
              sortKey === col.key
                ? sortDirection === 'asc' ? 'ascending' : 'descending'
                : 'none'
            ">
            <!-- Custom header template (optional) -->
            <ng-container *ngIf="headerTemplates.get(col.key) as hTpl; else defaultHeader">
              <ng-container *ngTemplateOutlet="hTpl; context: { $implicit: col }" />
            </ng-container>

            <ng-template #defaultHeader>
              <span class="th-content">
                {{ col.label }}
                <span class="sort-icon" *ngIf="col.sortable">{{ getSortIcon(col) }}</span>
              </span>
            </ng-template>
          </th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let row of pagedData; let i = index" [class.row-even]="i % 2 === 0">
          <td *ngFor="let col of columns" [style.text-align]="col.align || 'left'">
            <!-- Custom cell template takes priority over format/plain value -->
            <ng-container *ngIf="cellTemplates.get(col.key) as cellTpl; else defaultCell">
              <ng-container *ngTemplateOutlet="cellTpl; context: getCellContext(row, col)" />
            </ng-container>

            <ng-template #defaultCell>
              {{ getCellValue(row, col) }}
            </ng-template>
          </td>
        </tr>

        <tr *ngIf="pagedData.length === 0">
          <td [attr.colspan]="columns.length" class="empty-state">
            <span class="empty-icon">◫</span>
            <span>No results found</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Footer / Pagination -->
  <div class="table-footer" *ngIf="showPagination && filteredData.length > 0">
    <span class="record-count">
      Showing {{ startIndex }}–{{ endIndex }} of {{ filteredData.length }} records
    </span>

    <div class="pagination">
      <button class="page-btn" (click)="goToPage(1)" [disabled]="currentPage === 1" aria-label="First page">«</button>
      <button class="page-btn" (click)="goToPage(currentPage-1)" [disabled]="currentPage === 1"
        aria-label="Previous page">‹</button>

      <button *ngFor="let page of pageNumbers" class="page-btn" [class.active]="page === currentPage"
        (click)="goToPage(page)" [attr.aria-label]="'Page ' + page"
        [attr.aria-current]="page === currentPage ? 'page' : null">{{ page }}</button>

      <button class="page-btn" (click)="goToPage(currentPage+1)" [disabled]="currentPage === totalPages"
        aria-label="Next page">›</button>
      <button class="page-btn" (click)="goToPage(totalPages)" [disabled]="currentPage === totalPages"
        aria-label="Last page">»</button>
    </div>
  </div>
</div>

<!-- Content projection slot — consumed by @ContentChildren, invisible in DOM -->
<ng-content />
